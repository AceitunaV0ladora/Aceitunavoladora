<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aceituna Survivors - FIXED</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; height: 100vh; overflow: hidden; color: white; user-select: none;
        }
        #sidebar {
            width: 300px; height: 100%; background-color: #1a1a1a;
            border-right: 3px solid #444; padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column; z-index: 20;
        }
        #game-wrapper { flex-grow: 1; position: relative; background-color: #0a0a0a; }
        canvas { display: block; width: 100%; height: 100%; }
        #top-ui {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; z-index: 10;
        }
        .bar-container { width: 400px; height: 20px; background: #222; border: 2px solid #555; border-radius: 10px; margin-bottom: 5px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.2s; }
        #hp-bar { background: #ff4e4e; width: 100%; }
        #exp-bar { background: #ffd700; }
        .level-text { font-size: 24px; font-weight: bold; color: #ffd700; }
        #upgrade-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        .upgrade-option {
            background: #222; border: 2px solid #555; padding: 15px; margin: 10px;
            width: 400px; cursor: pointer; border-radius: 8px; text-align: center;
        }
        .upgrade-option:hover { border-color: #ffd700; background: #333; }
        .skill-item { background: #333; padding: 10px; margin-bottom: 10px; border-radius: 5px; border-left: 4px solid #ffd700; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color: #ffd700; border-bottom: 1px solid #444; padding-bottom: 10px;">HABILIDADES</h2>
    <div id="skills-list"></div>
</div>

<div id="game-wrapper">
    <div id="top-ui">
        <div class="bar-container"><div id="hp-bar" class="bar-fill"></div></div>
        <div class="bar-container"><div id="exp-bar" class="bar-fill"></div></div>
        <div class="level-text">NIVEL: <span id="level-val">1</span></div>
    </div>
    <div id="upgrade-menu">
        <h2 style="font-size: 32px;">SUBIDA DE NIVEL</h2>
        <div id="upgrade-list"></div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('game-wrapper');

    function resize() {
        canvas.width = wrapper.clientWidth;
        canvas.height = wrapper.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- ESTADO DEL JUEGO ---
    let player = {
        x: 0, y: 0, radius: 20, speed: 4, hp: 100, maxHp: 100,
        level: 1, exp: 0, expToNext: 10,
        fireRate: 50, multishot: 1, damage: 1, skills: {}
    };

    let keys = {};
    let enemies = [];
    let projectiles = [];
    let gems = [];
    let bosses = [];
    let frames = 0;
    let isPaused = false;

    window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
    window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

    const UPGRADES = [
        { id: 'multishot', title: 'Ráfaga', icon: '🦴' },
        { id: 'damage', title: 'Daño+', icon: '💥' },
        { id: 'fireRate', title: 'Velocidad Tiro', icon: '⏱️' },
        { id: 'speed', title: 'Agilidad', icon: '🚀' }
    ];

    // --- FUNCIONES ---
    function spawnEnemy() {
        if (frames % 60 === 0 && bosses.length === 0) {
            let angle = Math.random() * Math.PI * 2;
            enemies.push({
                x: player.x + Math.cos(angle) * 800,
                y: player.y + Math.sin(angle) * 800,
                hp: 1 + (player.level * 0.2),
                radius: 15
            });
        }
    }

    function shoot() {
        if (frames % player.fireRate === 0) {
            let target = enemies[0] || bosses[0];
            if (target) {
                let angle = Math.atan2(target.y - player.y, target.x - player.x);
                for(let i=0; i<player.multishot; i++){
                    let a = angle + (i - (player.multishot-1)/2) * 0.2;
                    projectiles.push({ x: player.x, y: player.y, angle: a, speed: 10, damage: player.damage });
                }
            }
        }
    }

    function update() {
        if (isPaused) return;

        // Movimiento
        if (keys.w) player.y -= player.speed;
        if (keys.s) player.y += player.speed;
        if (keys.a) player.x -= player.speed;
        if (keys.d) player.x += player.speed;

        spawnEnemy();
        shoot();

        // Projectiles
        projectiles.forEach((p, i) => {
            p.x += Math.cos(p.angle) * p.speed;
            p.y += Math.sin(p.angle) * p.speed;
            if (Math.hypot(p.x - player.x, p.y - player.y) > 1000) projectiles.splice(i, 1);
        });

        // Enemigos
        enemies.forEach((e, i) => {
            let a = Math.atan2(player.y - e.y, player.x - e.x);
            e.x += Math.cos(a) * 2;
            e.y += Math.sin(a) * 2;

            // Colisión con proyectil
            projectiles.forEach((p, pi) => {
                if (Math.hypot(p.x - e.x, p.y - e.y) < e.radius + 5) {
                    e.hp -= p.damage;
                    projectiles.splice(pi, 1);
                    if (e.hp <= 0) {
                        gems.push({ x: e.x, y: e.y });
                        enemies.splice(i, 1);
                    }
                }
            });

            // Daño al jugador
            if (Math.hypot(player.x - e.x, player.y - e.y) < player.radius + e.radius) {
                player.hp -= 0.2;
                document.getElementById('hp-bar').style.width = player.hp + '%';
            }
        });

        // Gemas (Experiencia)
        gems.forEach((g, i) => {
            let dist = Math.hypot(player.x - g.x, player.y - g.y);
            if (dist < 150) {
                let a = Math.atan2(player.y - g.y, player.x - g.x);
                g.x += Math.cos(a) * 10;
                g.y += Math.sin(a) * 10;
            }
            if (dist < 30) {
                player.exp++;
                gems.splice(i, 1);
                document.getElementById('exp-bar').style.width = (player.exp / player.expToNext * 100) + '%';
                if (player.exp >= player.expToNext) levelUp();
            }
        });

        // Jefe cada nivel 10
        if (player.level % 10 === 0 && bosses.length === 0) {
            bosses.push({ x: player.x + 500, y: player.y + 500, hp: 50, radius: 60 });
        }
        
        bosses.forEach((b, i) => {
            let a = Math.atan2(player.y - b.y, player.x - b.x);
            b.x += Math.cos(a) * 1.5; b.y += Math.sin(a) * 1.5;
            
            projectiles.forEach((p, pi) => {
                if (Math.hypot(p.x - b.x, p.y - b.y) < b.radius) {
                    b.hp -= p.damage; projectiles.splice(pi, 1);
                    if (b.hp <= 0) {
                        bosses.splice(i, 1);
                        player.exp += 10;
                    }
                }
            });
        });

        frames++;
    }

    function levelUp() {
        isPaused = true;
        player.exp = 0;
        player.level++;
        player.expToNext = Math.floor(player.expToNext * 1.3);
        document.getElementById('level-val').innerText = player.level;
        
        // Limpieza de pantalla
        enemies = [];
        
        const list = document.getElementById('upgrade-list');
        list.innerHTML = '';
        document.getElementById('upgrade-menu').style.display = 'flex';

        UPGRADES.sort(() => Math.random() - 0.5).slice(0, 3).forEach(up => {
            let div = document.createElement('div');
            div.className = 'upgrade-option';
            div.innerHTML = `<h3>${up.icon} ${up.title}</h3>`;
            div.onclick = () => {
                applyUpgrade(up.id);
                document.getElementById('upgrade-menu').style.display = 'none';
                isPaused = false;
            };
            list.appendChild(div);
        });
    }

    function applyUpgrade(id) {
        player.skills[id] = (player.skills[id] || 0) + 1;
        if (id === 'multishot') player.multishot++;
        if (id === 'damage') player.damage += 1;
        if (id === 'fireRate') player.fireRate = Math.max(10, player.fireRate - 10);
        if (id === 'speed') player.speed += 1;

        const sList = document.getElementById('skills-list');
        sList.innerHTML = '';
        for (let s in player.skills) {
            let up = UPGRADES.find(u => u.id === s);
            sList.innerHTML += `<div class="skill-item">${up.icon} ${up.title}: Lvl ${player.skills[s]}</div>`;
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // El truco está aquí: trasladamos el dibujo para que el jugador esté en el centro
        ctx.save();
        ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);

        // Fondo (Cuadrícula)
        ctx.strokeStyle = '#222';
        for(let i = player.x - 1000; i < player.x + 1000; i+=100) {
            ctx.beginPath(); ctx.moveTo(i, player.y - 1000); ctx.lineTo(i, player.y + 1000); ctx.stroke();
        }
        for(let j = player.y - 1000; j < player.y + 1000; j+=100) {
            ctx.beginPath(); ctx.moveTo(player.x - 1000, j); ctx.lineTo(player.x + 1000, j); ctx.stroke();
        }

        // Gemas
        gems.forEach(g => {
            ctx.fillStyle = '#ffd700';
            ctx.beginPath(); ctx.arc(g.x, g.y, 5, 0, Math.PI*2); ctx.fill();
        });

        // Enemigos
        enemies.forEach(e => {
            ctx.fillStyle = '#8b4513';
            ctx.beginPath(); ctx.fillRect(e.x - 15, e.y - 5, 30, 10);
        });

        // Jefe
        bosses.forEach(b => {
            ctx.fillStyle = '#621';
            ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'red'; ctx.fillRect(b.x - 30, b.y - 70, 60 * (b.hp/(50+(player.level*2))), 10);
        });

        // Proyectiles
        projectiles.forEach(p => {
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
        });

        // JUGADOR (La Aceituna)
        ctx.fillStyle = '#6b8e23'; // Verde oliva
        ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'red'; // Pimiento
        ctx.beginPath(); ctx.arc(player.x, player.y - 5, 8, 0, Math.PI*2); ctx.fill();

        ctx.restore();

        update();
        requestAnimationFrame(draw);
    }

    draw();
</script>

</body>
</html>

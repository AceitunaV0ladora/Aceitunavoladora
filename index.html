<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página Personal</title>
    <style>
        /* --- ESTILOS CSS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Fondo con degradado animado */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px); /* Efecto Glassmorphism */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            max-width: 450px;
            width: 90%;
            transition: transform 0.4s ease;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 3px solid white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.2);
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 25px;
            font-weight: 300;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: white;
            color: #e73c7e;
            transform: translateY(-2px);
        }

        .social {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .social a:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-pic">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar">
        </div>
        
        <h1>Hola, soy [Tu Nombre]</h1>
        <p class="subtitle">Creando cosas increíbles en la web.</p>
        
        <div class="links">
            <a href="#" class="btn">🚀 Ver mis Proyectos</a>
            <a href="#" class="btn">📄 Descargar CV</a>
            <a href="mailto:tu@email.com" class="btn">✉️ Contactar conmigo</a>
        </div>

        <div class="social">
            <a href="#">GitHub</a>
            <a href="#">LinkedIn</a>
            <a href="#">Instagram</a>
        </div>
    </div>

</body>
</html>

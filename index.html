<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aceituna Survivors - Calidad Máxima</title>
    <style>
        body { margin: 0; padding: 0; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* PANEL LATERAL PROFESIONAL */
        #sidebar { 
            width: 300px; background: #1a140f; border-right: 4px solid #5c3a21; 
            padding: 20px; box-sizing: border-box; z-index: 20; box-shadow: 10px 0 20px rgba(0,0,0,0.5);
        }
        .sidebar-title { font-size: 18px; color: #d4a373; letter-spacing: 2px; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 20px; text-align: center; }
        .skill-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; border: 1px solid #3d2412; margin-bottom: 10px; display: flex; align-items: center; }
        .skill-icon { font-size: 24px; margin-right: 15px; }

        /* ÁREA DE JUEGO */
        #game-area { flex-grow: 1; position: relative; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }

        /* HUD SUPERIOR */
        #hud { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); pointer-events: none; text-align: center; }
        .bar-container { width: 450px; height: 20px; background: rgba(0,0,0,0.6); border: 2px solid #444; border-radius: 10px; margin-bottom: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .fill { height: 100%; transition: width 0.2s; }
        #hp-fill { background: linear-gradient(90deg, #8b0000, #ff4e4e); width: 100%; }
        #exp-fill { background: linear-gradient(90deg, #b38b00, #ffdf40); width: 0%; }
        #lvl-text { font-size: 32px; font-weight: 900; color: #ffd700; text-shadow: 2px 2px 5px #000; }

        /* MENÚ DE MEJORAS */
        #menu { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(5px); }
        .option { background: #2a2a2a; border: 2px solid #ffd700; padding: 20px; margin: 10px; width: 450px; cursor: pointer; border-radius: 12px; transition: 0.2s; }
        .option:hover { background: #3a3a3a; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-title">HABILIDADES</div>
    <div id="skills-list"></div>
</div>

<div id="game-area">
    <div id="hud">
        <div class="bar-container"><div id="hp-fill" class="fill"></div></div>
        <div class="bar-container"><div id="exp-fill" class="fill"></div></div>
        <div id="lvl-text">NIVEL 1</div>
    </div>

    <div id="menu">
        <h2 style="font-size: 40px; color: #ffd700;">ELIGE TU PODER</h2>
        <div id="options-container"></div>
    </div>

    <canvas id="canvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const area = document.getElementById('game-area');

    function resize() { canvas.width = area.clientWidth; canvas.height = area.clientHeight; }
    window.onresize = resize; resize();

    // --- CONFIGURACIÓN ---
    let player = { x: 0, y: 0, r: 25, speed: 4.5, hp: 100, exp: 0, next: 10, lvl: 1, dmg: 1, rate: 50, multi: 1, skills: {} };
    let enemies = [], projectiles = [], gems = [], bosses = [], particles = [];
    let keys = {}, frames = 0, paused = false;

    window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
    window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

    const UPGRADES = [
        { id: 'dmg', n: 'Huesos de Titanio', i: '💥', d: '+ Daño por impacto' },
        { id: 'rate', n: 'Fuego Rápido', i: '⏱️', d: 'Dispara huesos más rápido' },
        { id: 'multi', n: 'Multitiro', i: '🦴', d: 'Dispara proyectiles extra' },
        { id: 'speed', n: 'Turbo Oliva', i: '🚀', d: '+ Velocidad de vuelo' }
    ];

    // --- CLASES Y RENDER ---
    class Particle {
        constructor(x, y, c) { this.x = x; this.y = y; this.c = c; this.v = {x:(Math.random()-0.5)*10, y:(Math.random()-0.5)*10}; this.l = 1.0; }
        draw() { ctx.globalAlpha = this.l; ctx.fillStyle = this.c; ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1; }
    }

    function createExplosion(x, y, color) { for(let i=0; i<10; i++) particles.push(new Particle(x, y, color)); }

    function update() {
        if (paused) return;

        // Movimiento lógico
        if (keys.w) player.y -= player.speed; if (keys.s) player.y += player.speed;
        if (keys.a) player.x -= player.speed; if (keys.d) player.x += player.speed;

        // Spawn (Dificultad escalada)
        if (frames % Math.max(10, (60 - player.lvl*2)) === 0 && bosses.length === 0) {
            let a = Math.random() * Math.PI * 2;
            enemies.push({ x: player.x + Math.cos(a)*800, y: player.y + Math.sin(a)*800, hp: 1 + player.lvl*0.5, r: 15 });
        }

        // Jefe nivel 10
        if (player.lvl % 10 === 0 && bosses.length === 0) {
            bosses.push({ x: player.x + 500, y: player.y + 500, hp: 50 * player.lvl, max: 50 * player.lvl, r: 70 });
        }

        // Disparo
        if (frames % player.rate === 0) {
            let target = enemies[0] || bosses[0];
            if (target) {
                let a = Math.atan2(target.y - player.y, target.x - player.x);
                for(let i=0; i<player.multi; i++){
                    let angle = a + (i - (player.multi-1)/2) * 0.2;
                    projectiles.push({ x: player.x, y: player.y, vx: Math.cos(angle)*12, vy: Math.sin(angle)*12 });
                }
            }
        }

        // Proyectiles
        projectiles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy;
            if (Math.hypot(p.x - player.x, p.y - player.y) > 1200) projectiles.splice(i, 1);
        });

        // Enemigos (Palillos con calidad)
        enemies.forEach((e, i) => {
            let a = Math.atan2(player.y - e.y, player.x - e.x);
            e.x += Math.cos(a) * 2.2; e.y += Math.sin(a) * 2.2;

            projectiles.forEach((p, pi) => {
                if (Math.hypot(p.x - e.x, p.y - e.y) < 25) {
                    e.hp -= player.dmg; projectiles.splice(pi, 1);
                    if (e.hp <= 0) { createExplosion(e.x, e.y, '#d2b48c'); gems.push({x:e.x, y:e.y}); enemies.splice(i, 1); }
                }
            });
            if (Math.hypot(player.x - e.x, player.y - e.y) < 40) player.hp -= 0.4;
        });

        // Jefe
        bosses.forEach((b, i) => {
            let a = Math.atan2(player.y - b.y, player.x - b.x);
            b.x += Math.cos(a) * 1.5; b.y += Math.sin(a) * 1.5;
            projectiles.forEach((p, pi) => {
                if (Math.hypot(p.x - b.x, p.y - b.y) < b.r) {
                    b.hp -= player.dmg; projectiles.splice(pi, 1);
                    if (b.hp <= 0) { createExplosion(b.x, b.y, '#631'); player.exp += 15; bosses.splice(i, 1); checkExp(); }
                }
            });
            if (Math.hypot(player.x - b.x, player.y - b.y) < b.r) player.hp -= 1.2;
        });

        // Gemas e Iman
        gems.forEach((g, i) => {
            let d = Math.hypot(player.x - g.x, player.y - g.y);
            if (d < 180) { let a = Math.atan2(player.y-g.y, player.x-g.x); g.x += Math.cos(a)*10; g.y += Math.sin(a)*10; }
            if (d < 30) { gems.splice(i, 1); player.exp++; checkExp(); }
        });

        particles.forEach((p, i) => { p.x += p.v.x; p.y += p.v.y; p.l -= 0.02; if(p.l <= 0) particles.splice(i, 1); });

        document.getElementById('hp-fill').style.width = player.hp + "%";
        if (player.hp <= 0) { alert("¡GAME OVER! Has llegado al nivel " + player.lvl); location.reload(); }
        frames++;
    }

    function checkExp() {
        document.getElementById('exp-fill').style.width = (player.exp/player.next*100) + "%";
        if (player.exp >= player.next) {
            paused = true; player.exp = 0; player.lvl++; player.next *= 1.5;
            document.getElementById('lvl-text').innerText = "NIVEL " + player.lvl;
            enemies = []; // Limpieza de nivel
            showMenu();
        }
    }

    function showMenu() {
        let cont = document.getElementById('options-container');
        cont.innerHTML = '';
        document.getElementById('menu').style.display = 'flex';
        UPGRADES.sort(()=>Math.random()-0.5).slice(0,3).forEach(u => {
            let div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<div style="font-size:24px"><b>${u.i} ${u.n}</b></div><div style="color:#aaa">${u.d}</div>`;
            div.onclick = () => {
                if(u.id === 'dmg') player.dmg += 1.5;
                if(u.id === 'rate') player.rate = Math.max(10, player.rate - 6);
                if(u.id === 'multi') player.multi++;
                if(u.id === 'speed') player.speed += 1;
                player.skills[u.id] = (player.skills[u.id] || 0) + 1;
                updateSidebar();
                document.getElementById('menu').style.display = 'none';
                paused = false;
            };
            cont.appendChild(div);
        });
    }

    function updateSidebar() {
        let list = document.getElementById('skills-list');
        list.innerHTML = '';
        for (let id in player.skills) {
            let u = UPGRADES.find(x => x.id === id);
            list.innerHTML += `<div class="skill-card"><span class="skill-icon">${u.i}</span><div><b>${u.n}</b><br><small>Lvl ${player.skills[id]}</small></div></div>`;
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let camX = canvas.width/2 - player.x;
        let camY = canvas.height/2 - player.y;
        
        ctx.save();
        ctx.translate(camX, camY);

        // Fondo Estilizado
        ctx.strokeStyle = "#111"; ctx.lineWidth = 2;
        for(let x = Math.floor(player.x/100)*100 - 1000; x < player.x + 1000; x+=100) {
            ctx.beginPath(); ctx.moveTo(x, player.y-1000); ctx.lineTo(x, player.y+1000); ctx.stroke();
        }
        for(let y = Math.floor(player.y/100)*100 - 1000; y < player.y + 1000; y+=100) {
            ctx.beginPath(); ctx.moveTo(player.x-1000, y); ctx.lineTo(player.x+1000, y); ctx.stroke();
        }

        // Gemas (Aceite Brillante)
        gems.forEach(g => {
            ctx.shadowBlur = 10; ctx.shadowColor = "gold";
            ctx.fillStyle = "gold"; ctx.beginPath(); ctx.arc(g.x, g.y, 6, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        });

        // Enemigos (Palillos con punta)
        enemies.forEach(e => {
            ctx.fillStyle = "#d2b48c"; ctx.fillRect(e.x-20, e.y-3, 35, 6);
            ctx.fillStyle = "#ff4444"; ctx.beginPath(); ctx.moveTo(e.x+15, e.y-3); ctx.lineTo(e.x+25, e.y); ctx.lineTo(e.x+15, e.y+3); ctx.fill();
        });

        // Boss (Albóndiga Mutante)
        bosses.forEach(b => {
            ctx.fillStyle = "#631"; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
            // Pinchos del Jefe
            ctx.strokeStyle = "#d4a373"; ctx.lineWidth = 4;
            for(let i=0; i<8; i++){
                let ang = i * Math.PI/4 + frames*0.02;
                ctx.beginPath(); ctx.moveTo(b.x, b.y); 
                ctx.lineTo(b.x + Math.cos(ang)*(b.r+20), b.y + Math.sin(ang)*(b.r+20)); ctx.stroke();
            }
            // Vida Jefe Superior
            ctx.fillStyle = "red"; ctx.fillRect(b.x-b.r, b.y-b.r-20, b.r*2 * (b.hp/b.max), 8);
        });

        // Proyectiles (Huesos)
        projectiles.forEach(p => {
            ctx.fillStyle = "#fff"; ctx.shadowBlur = 5; ctx.shadowColor = "white";
            ctx.beginPath(); ctx.ellipse(p.x, p.y, 8, 4, Math.atan2(p.vy, p.vx), 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        });

        particles.forEach(p => p.draw());

        // LA ACEITUNA (CALIDAD 3D)
        ctx.save();
        ctx.translate(player.x, player.y);
        // Cuerpo con degradado
        let grad = ctx.createRadialGradient(-7, -7, 2, 0, 0, 25);
        grad.addColorStop(0, "#b8e067"); grad.addColorStop(1, "#4A6318");
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0, 0, 25, 0, Math.PI*2); ctx.fill();
        // Pimiento
        ctx.fillStyle = "#cc0000"; ctx.beginPath(); ctx.arc(0, -8, 10, 0, Math.PI*2); ctx.fill();
        // Brillo final
        ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.beginPath(); ctx.ellipse(-10, -10, 5, 2, -Math.PI/4, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        ctx.restore();
        update();
        requestAnimationFrame(draw);
    }

    draw();
</script>
</body>
</html>

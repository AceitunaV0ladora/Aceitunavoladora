<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil Dinámico</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --text: #1e293b;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 2rem; border-radius: 1rem; shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 500px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .editor-box { background: #f1f5f9; padding: 1rem; border-radius: 0.5rem; margin-bottom: 2rem; border: 1px solid #e2e8f0; }
        h2 { font-size: 1.2rem; margin-top: 0; color: var(--primary); }
        input, textarea { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; }
        
        /* Estilo del Perfil Actualizado */
        .preview { text-align: center; border-top: 2px solid #f1f5f9; padding-top: 2rem; }
        .display-name { font-size: 2rem; margin: 0; color: var(--text); }
        .display-bio { color: #64748b; font-style: italic; }
        .badge-container { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 1rem; }
        .badge { background: var(--primary); color: white; padding: 4px 12px; border-radius: 99px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="card">
    <div class="editor-box">
        <h2>⚙️ Editor en Vivo</h2>
        <label>Tu Nombre:</label>
        <input type="text" id="inputName" placeholder="Escribe tu nombre..." oninput="updateProfile()">
        
        <label>Tu Bio:</label>
        <textarea id="inputBio" rows="3" placeholder="Cuéntanos algo sobre ti..." oninput="updateProfile()"></textarea>
        
        <label>Habilidades (separadas por comas):</label>
        <input type="text" id="inputSkills" placeholder="Ej: Creativo, Programador, Guitarrista" oninput="updateProfile()">
    </div>

    <div class="preview">
        <h1 class="display-name" id="displayName">Tu Nombre</h1>
        <p class="display-bio" id="displayBio">Aquí aparecerá tu descripción en tiempo real...</p>
        <div class="badge-container" id="displaySkills">
            </div>
    </div>
</div>

<script>
    function updateProfile() {
        // Obtener valores de los inputs
        const name = document.getElementById('inputName').value;
        const bio = document.getElementById('inputBio').value;
        const skills = document.getElementById('inputSkills').value;

        // Actualizar textos
        document.getElementById('displayName').innerText = name || "Tu Nombre";
        document.getElementById('displayBio').innerText = bio || "Aquí aparecerá tu descripción en tiempo real...";

        // Actualizar burbujas de habilidades
        const skillsContainer = document.getElementById('displaySkills');
        skillsContainer.innerHTML = ''; // Limpiar previo
        
        if (skills) {
            skills.split(',').forEach(skill => {
                if (skill.trim() !== "") {
                    const span = document.createElement('span');
                    span.className = 'badge';
                    span.innerText = skill.trim();
                    skillsContainer.appendChild(span);
                }
            });
        }
    }
</script>

</body>
</html>
